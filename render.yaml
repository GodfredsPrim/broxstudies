services:
  - type: web
    name: broxstudies-unified
    env: python
    buildCommand: npm install --prefix frontend && npm run build --prefix frontend && pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: broxstudies-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: NODE_VERSION
        value: 20.0.0
      - key: CORS_ORIGINS
        value: "*"

      # LLM
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: DEEPSEEK_MODEL
        value: deepseek-chat
      - key: LLM_FALLBACK_ENABLED
        value: "true"

      # Google OAuth
      - key: GOOGLE_CLIENT_ID
        value: "748706529106-74ndip7i7e26gjo7gjjf4dto5677eg51.apps.googleusercontent.com"
      - key: GOOGLE_CLIENT_SECRET
        sync: false

      # Auth & Admin
      - key: AUTH_SECRET_KEY
        generateValue: true
      - key: ADMIN_SECRET
        generateValue: true
      - key: ADMIN_USERNAME
        value: broxstudiesadmin
      - key: ADMIN_PASSWORD
        sync: false

      # Subscription
      - key: SUBSCRIPTION_PRICE_GHS
        value: "20"
      - key: SUBSCRIPTION_MONTHS
        value: "3"

      # Document Loading
      - key: AUTO_LOAD_ON_STARTUP
        value: "true"
      - key: SELECTIVE_LOAD
        value: "true"
      - key: LAZY_LOAD
        value: "true"

databases:
  - name: broxstudies-db
    plan: free
