services:
  # Unified Web Service (Frontend + Backend)
  - type: web
    name: broxstudies-unified
    env: docker
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: broxstudies-db
          property: connectionString
      - key: CORS_ORIGINS
        value: "*"
      - key: OPENAI_API_KEY
        sync: false
      - key: AUTH_SECRET_KEY
        generateValue: true
      - key: ADMIN_SECRET
        generateValue: true

# Database
databases:
  - name: broxstudies-db
    plan: free
