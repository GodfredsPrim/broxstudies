<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#FAF7F0" />
    <meta name="description" content="BroxStudies for SHS — AI-powered WASSCE exam prep built for Ghanaian Senior High School students." />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />

    <title>BroxStudies for SHS — Master WASSCE</title>
    <script>
      // Apply saved theme before React paints — prevents flash.
      (function () {
        try {
          var saved = localStorage.getItem('brox.theme');
          var theme = saved === 'dark' || saved === 'light' ? saved : 'light';
          if (theme === 'dark') document.documentElement.classList.add('dark');
        } catch (_) { /* no-op */ }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
