<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#1B2020" />
    <meta name="description" content="BroxStudies — AI-powered learning platform for Ghanaian SHS and TVET students. Master WASSCE with AI tutoring, practice exams, and personalized study." />

    <!-- PWA -->
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />

    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="BroxStudies" />
    <meta name="mobile-web-app-capable" content="yes" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Archivo:ital,wght@0,600;0,700;0,800;0,900;1,700&family=IBM+Plex+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <title>BroxStudies — AI-Powered Learning for Ghanaian Students</title>
    <meta property="og:title" content="BroxStudies — Master WASSCE with AI" />
    <meta property="og:description" content="AI tutoring, practice exams, live quizzes, and personalized analytics for Ghanaian SHS and TVET students." />

    <meta property="og:url" content="https://broxstudies.com/welcome" />

    <script>
      (function () {
        try {
          var saved = localStorage.getItem('brox.theme');
          var theme = saved === 'light' ? 'light' : 'dark';
          document.documentElement.classList.add(theme === 'light' ? 'light' : 'dark');
        } catch (_) { document.documentElement.classList.add('dark'); }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
