<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#030712" />
    <meta name="description" content="BroxStudies — AI-powered learning platform for Ghanaian SHS and TVET students. Master WASSCE with AI tutoring, practice exams, and personalized study." />

    <!-- PWA -->
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="BroxStudies" />
    <meta name="mobile-web-app-capable" content="yes" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />

    <title>BroxStudies — AI-Powered Learning for Ghanaian Students</title>
    <script>
      (function () {
        try {
          var saved = localStorage.getItem('brox.theme');
          var theme = saved === 'light' ? 'light' : 'dark';
          document.documentElement.classList.add(theme === 'light' ? 'light' : 'dark');
        } catch (_) { document.documentElement.classList.add('dark'); }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
