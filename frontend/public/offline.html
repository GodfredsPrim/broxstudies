<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BisaME Offline</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: Manrope, sans-serif;
        background: linear-gradient(180deg, #fdfefe 0%, #f2f7fb 100%);
        color: #101923;
      }
      main {
        width: min(92vw, 560px);
        border-radius: 24px;
        padding: 2rem;
        background: white;
        box-shadow: 0 16px 40px rgba(16, 25, 35, 0.12);
      }
      h1 {
        margin-top: 0;
      }
    </style>

  <body>
    <main>
      <h1>You are offline</h1>
      <p>The app shell is still available. Open a saved mock exam pack or reconnect to sync fresh data.</p>
    </main>
