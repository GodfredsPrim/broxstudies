<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">BroxStudies</title>
  <desc id="desc">The emerald Bx mark shown on the BroxStudies splash screen</desc>
  <defs>
    <linearGradient id="splash-gradient" x1="64" y1="48" x2="448" y2="464" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#34D399"/>
      <stop offset="1" stop-color="#047857"/>
