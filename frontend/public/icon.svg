  </defs>
  <rect width="512" height="512" rx="128" fill="url(#splash-gradient)"/>
  <text x="256" y="318" fill="#02180F" font-family="Archivo, Arial, sans-serif" font-size="196" font-weight="800" letter-spacing="-10" text-anchor="middle">Bx</text>
</svg>
