<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Timed Exam — BisaME Osuani</title>
  <meta name="description" content="Take a timed mock exam under real WASSCE conditions with AI-generated questions and automatic scoring." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="static/css/custom.css" />
</head>
<body>

  <!-- ── Nav ────────────────────────────────────────────────────────── -->
  <nav class="nav-main px-6 py-4">
    <div class="max-w-6xl mx-auto flex items-center justify-between">
      <a href="index.html" class="nav-brand flex items-center gap-2">
        <span class="text-2xl">📚</span> BisaME Osuani
      </a>
      <div class="flex items-center gap-4">
        <a href="dashboard.html" class="text-sm text-slate-400 hover:text-white transition">Dashboard</a>
        <div id="timer-display" class="hidden bg-white/5 border border-white/10 rounded-lg px-4 py-2 font-mono text-lg font-bold text-yellow-400">
          00:00
        </div>
      </div>
    </div>
  </nav>

  <!-- ── Timer Bar ──────────────────────────────────────────────────── -->
  <div class="w-full bg-white/5 h-1">
    <div id="timer-bar" class="timer-bar" style="width:100%"></div>
  </div>

  <main class="max-w-4xl mx-auto px-6 py-10">

    <!-- ── Setup Panel ──────────────────────────────────────────────── -->
    <div id="exam-setup" class="fade-up">
      <div class="text-center mb-10">
        <h1 class="text-3xl font-extrabold mb-2">⏱️ Timed <span class="highlight">Mock Exam</span></h1>
        <p class="text-slate-400">Simulate real WASSCE conditions — questions, timer, and instant grading.</p>
      </div>

      <div class="glass-card gradient-border p-8 max-w-lg mx-auto">
        <form id="exam-setup-form" onsubmit="startExam(event)" class="space-y-5">
          <div>
            <label class="block text-xs text-slate-400 mb-1 font-medium">Subject</label>
            <select id="exam-subject" required class="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-3 text-sm focus:outline-none focus:border-yellow-400 appearance-none">
              <option value="">Select subject…</option>
            </select>
          </div>
          <div>
            <label class="block text-xs text-slate-400 mb-1 font-medium">Topic</label>
            <input type="text" id="exam-topic" required placeholder="e.g. Quadratic Equations"
              class="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-3 text-sm focus:outline-none focus:border-yellow-400" />
          </div>
          <div class="grid grid-cols-2 gap-4">
            <div>
              <label class="block text-xs text-slate-400 mb-1 font-medium">Questions</label>
              <input type="number" id="exam-num" value="10" min="5" max="50"
                class="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-3 text-sm focus:outline-none focus:border-yellow-400" />
            </div>
            <div>
              <label class="block text-xs text-slate-400 mb-1 font-medium">Time (minutes)</label>
              <input type="number" id="exam-time" value="15" min="5" max="180"
                class="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-3 text-sm focus:outline-none focus:border-yellow-400" />
            </div>
          </div>
          <button type="submit" class="btn-gold w-full py-3 text-base" id="exam-start-btn">🎯 Start Exam</button>
        </form>
      </div>
    </div>

    <!-- ── Loading ──────────────────────────────────────────────────── -->
    <div id="exam-loading" class="hidden text-center py-20">
      <div class="inline-block w-12 h-12 border-4 border-yellow-400 border-t-transparent rounded-full animate-spin mb-4"></div>
      <p class="text-slate-400">Generating your exam…</p>
    </div>

    <!-- ── Exam Questions ───────────────────────────────────────────── -->
    <div id="exam-active" class="hidden">
      <div class="flex items-center justify-between mb-6">
        <h2 class="text-lg font-bold">Mock Exam</h2>
        <span class="text-sm text-slate-400">Score: <span id="live-score" class="text-yellow-400 font-bold">0 / 0</span></span>
      </div>
      <div id="exam-questions-container"></div>
      <div class="text-center mt-8">
        <button onclick="finishExam()" class="btn-gold py-3 px-10 text-base">✅ Submit Exam</button>
      </div>
    </div>

    <!-- ── Results ──────────────────────────────────────────────────── -->
    <div id="exam-results" class="hidden text-center py-16 fade-up">
      <h2 class="text-2xl font-bold mb-6">Exam Complete!</h2>
      <div class="score-ring mb-6" data-score="0%"></div>
      <p class="text-slate-400 mb-2" id="result-detail"></p>
      <p class="text-sm text-slate-500 mb-8" id="result-time"></p>
      <div class="flex justify-center gap-4">
        <button onclick="location.reload()" class="btn-gold py-3 px-8">Try Again</button>
        <a href="dashboard.html" class="btn-outline py-3 px-8">Back to Dashboard</a>
      </div>
    </div>

  </main>

  <div id="toast-container" class="fixed top-4 right-4 z-[60] flex flex-col gap-2"></div>

  <script src="static/js/app.js"></script>
  <script>
    let examStartTime = null;

    // Populate subjects
    (async () => {
      let subjects;
      try { subjects = await loadSubjects(); }
      catch {
        subjects = {
          core: [
            { name: 'English Language', code: 'ENG' },
            { name: 'Mathematics (Core)', code: 'CMATH' },
            { name: 'Integrated Science', code: 'ISCI' },
            { name: 'Social Studies', code: 'SSCI' },
          ],
          elective: [
            { name: 'Physics', code: 'PHY' },
            { name: 'Chemistry', code: 'CHEM' },
            { name: 'Biology', code: 'BIO' },
            { name: 'Economics', code: 'ECON' },
          ],
        };
      }

      const sel = document.getElementById('exam-subject');
      const addGroup = (label, list) => {
        const og = document.createElement('optgroup');
        og.label = label;
        list.forEach(s => {
          const opt = document.createElement('option');
          opt.value = s.name;
          opt.textContent = s.name;
          og.appendChild(opt);
        });
        sel.appendChild(og);
      };
      addGroup('Core Subjects', subjects.core);
      addGroup('Elective Subjects', subjects.elective);
    })();

    async function startExam(e) {
      e.preventDefault();
      const setup = document.getElementById('exam-setup');
      const loading = document.getElementById('exam-loading');
      const active = document.getElementById('exam-active');
      const container = document.getElementById('exam-questions-container');
      const timerDisplay = document.getElementById('timer-display');
      const timerBarEl = document.getElementById('timer-bar');

      hide(setup);
      show(loading);
      container.innerHTML = '';

      try {
        const questions = await generateQuestions(
          document.getElementById('exam-subject').value,
          document.getElementById('exam-topic').value,
          'MCQ',
          parseInt(document.getElementById('exam-num').value) || 10,
        );

        hide(loading);
        show(active);
        show(timerDisplay);

        document.getElementById('live-score').textContent = `0 / ${questions.length}`;
        questions.forEach((q, i) => renderQuestion(q, i, container));

        // Start timer
        const totalSeconds = (parseInt(document.getElementById('exam-time').value) || 15) * 60;
        examStartTime = Date.now();

        startTimer(
          totalSeconds,
          (timeLeft, total) => {
            timerDisplay.textContent = formatTime(timeLeft);
            const pct = (timeLeft / total) * 100;
            timerBarEl.style.width = pct + '%';
            if (timeLeft <= 60) timerDisplay.classList.add('text-red-400');
          },
          () => { finishExam(); },
        );

      } catch (err) {
        hide(loading);
        show(setup);
        toast(err.message, 'error');
      }
    }

    function finishExam() {
      stopTimer();
      const elapsed = examStartTime ? Math.round((Date.now() - examStartTime) / 1000) : 0;

      hide(document.getElementById('exam-active'));
      hide(document.getElementById('timer-display'));

      const results = document.getElementById('exam-results');
      show(results);

      const total = state.questions.length;
      const score = state.score;
      const pct = total > 0 ? Math.round((score / total) * 100) : 0;

      renderScoreRing(score, total);
      document.getElementById('result-detail').textContent = `You scored ${score} out of ${total} (${pct}%)`;
      document.getElementById('result-time').textContent = `Time taken: ${formatTime(elapsed)}`;
    }
  </script>

</body>
</html>
